stages:
  snapshot:
    cmd: python -m src.ingestion.cli build-snapshot --output-dir artifacts/snapshots
      data/raw_ebs/*_ebs
    deps:
      - data/raw_ebs
      - src/ingestion
    outs:
      - artifacts/snapshots

  profile:
    cmd: python -m src.data.real_profile --ebs-dir data/raw_ebs --output artifacts/synthetic/profile.json
    deps:
      - data/raw_ebs
      - src/data/real_profile.py
    outs:
      - artifacts/synthetic/profile.json

  features:
    cmd: python -m src.data.generate_datasets features --output artifacts/synthetic
    deps:
      - src/data/synthetic_generator.py
      - src/data/generate_datasets.py
    outs:
      - artifacts/synthetic/features

  raw_data:
    cmd: python -m src.data.generate_datasets raw --output artifacts/synthetic --profile artifacts/synthetic/profile.json
    deps:
      - artifacts/synthetic/profile.json
      - src/data/ebs_generator.py
      - src/data/generate_datasets.py
    outs:
      - artifacts/synthetic/raw_ebs

  d2_features:
    cmd: python -m src.features.cli build-d2 --output artifacts/features
    deps:
      - artifacts/snapshots
      - src/features/builder.py
      - src/features/schema.py
    outs:
      - artifacts/features

  weak_labels:
    cmd: python -m src.features.cli weak-label --output artifacts/features_labeled
    deps:
      - artifacts/features
      - src/features/weak_labels.py
    outs:
      - artifacts/features_labeled
